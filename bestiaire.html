<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiaire de Westeros — Encyclopédie Game of Thrones</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#e8d08a;--gold-d:#7a5c1e;
  --parch:#f2e4c0;--parch-m:#d9c48a;
  --stone:#1a1508;--panel:rgba(20,15,5,0.97);
  --border:rgba(201,168,76,0.2);--border-b:rgba(201,168,76,0.5);
  /* Catégories */
  --c-dragon:#c94c4c; --c-loup:#7ab0d4; --c-fantastique:#9a7ac9;
  --c-animal:#7ab878; --c-naval:#5a9aaa;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--stone);background-image:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(140,30,30,.18) 0%,transparent 55%);min-height:100vh;font-family:'EB Garamond',serif;color:var(--parch);overflow-x:hidden}

/* ── HEADER ── */
header{text-align:center;padding:1.8rem 2rem 1.4rem;border-bottom:1px solid var(--gold-d);background:linear-gradient(180deg,rgba(80,15,15,.22) 0%,transparent 100%)}
.site-back{display:inline-flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d);text-decoration:none;margin-bottom:.7rem;transition:color .2s;opacity:.7}
.site-back:hover{color:var(--gold);opacity:1}
.orn{font-size:1.3rem;color:var(--gold-d);letter-spacing:.5em;opacity:.5;display:block;margin-bottom:.25rem}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1rem,3vw,2rem);color:var(--gold);text-shadow:0 2px 28px rgba(201,168,76,.35);letter-spacing:.04em}
.sub{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-d);margin-top:.4rem}

/* ── CONTROLS ── */
.controls{position:sticky;top:0;z-index:60;background:rgba(10,7,2,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.65rem 1.2rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
.search-wrap::before{content:'🔍';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.75rem;opacity:.35;pointer-events:none}
#searchInput{width:100%;background:rgba(245,232,200,.05);border:1px solid var(--border);color:var(--parch);font-family:'EB Garamond',serif;font-size:.9rem;padding:.38rem .65rem .38rem 1.85rem;outline:none;border-radius:1px;transition:border-color .2s}
#searchInput::placeholder{color:rgba(245,228,192,.2);font-style:italic}
#searchInput:focus{border-color:var(--gold-d)}
.controls-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.filter-group{display:flex;gap:.28rem;flex-wrap:wrap;align-items:center}
.filter-label{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);opacity:.55;white-space:nowrap}
.pill{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .55rem;border-radius:1px;cursor:pointer;border:1px solid transparent;background:transparent;transition:all .18s;white-space:nowrap;opacity:.5}
.pill:hover{opacity:.85}
.pill.active{opacity:1}
/* series pills */
.ps-all{color:var(--gold);border-color:var(--gold-d)}.ps-all.active{background:rgba(201,168,76,.1);border-color:var(--gold)}
.ps-got{color:#a0c8e8;border-color:#a0c8e8}.ps-got.active{background:rgba(160,200,232,.1)}
.ps-hotd{color:#e07070;border-color:#e07070}.ps-hotd.active{background:rgba(224,112,112,.1)}
.ps-akotsk{color:#90c890;border-color:#90c890}.ps-akotsk.active{background:rgba(144,200,144,.1)}
/* category pills */
.pc-all{color:var(--gold);border-color:var(--gold-d)}.pc-all.active{background:rgba(201,168,76,.1);border-color:var(--gold)}
.pc-dragon{color:var(--c-dragon);border-color:var(--c-dragon)}.pc-dragon.active{background:rgba(201,76,76,.1)}
.pc-loup{color:var(--c-loup);border-color:var(--c-loup)}.pc-loup.active{background:rgba(122,176,212,.1)}
.pc-fantastique{color:var(--c-fantastique);border-color:var(--c-fantastique)}.pc-fantastique.active{background:rgba(154,122,201,.1)}
.pc-animal{color:var(--c-animal);border-color:var(--c-animal)}.pc-animal.active{background:rgba(122,184,120,.1)}
.count-badge{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.15em;color:var(--gold-d);opacity:.55;margin-left:auto;white-space:nowrap}

/* ── GRID ── */
.grid-wrap{max-width:1400px;margin:0 auto;padding:1.6rem 1.2rem 4rem}
.category-header{display:flex;align-items:center;gap:1rem;margin:2rem 0 1rem}
.category-header::before,.category-header::after{content:'';flex:1;height:1px}
.category-header::before{background:linear-gradient(90deg,transparent,var(--cat-clr))}
.category-header::after{background:linear-gradient(270deg,transparent,var(--cat-clr))}
.cat-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cat-clr);white-space:nowrap;padding:0 .6rem}
.cat-count{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.15em;color:var(--cat-clr);opacity:.5}

.bestiary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:.5rem}

/* ── CREATURE CARD ── */
.creature-card{background:var(--panel);border:1px solid var(--border);border-radius:1px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.creature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cc-clr),transparent);opacity:.6}
.creature-card:hover{transform:translateY(-3px);border-color:var(--cc-clr);box-shadow:0 8px 28px rgba(0,0,0,.5)}
.creature-card.hidden{display:none}

.card-emoji{font-size:2.2rem;display:block;text-align:center;padding:1.1rem 1rem .4rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.card-body{padding:.5rem 1rem 1rem}
.card-name{font-family:'Cinzel',serif;font-size:.92rem;color:var(--parch);text-align:center;margin-bottom:.3rem;line-height:1.25}
.card-epithet{font-family:'EB Garamond',serif;font-size:.78rem;font-style:italic;color:var(--gold-d);text-align:center;margin-bottom:.6rem;opacity:.8}
.card-tags{display:flex;flex-wrap:wrap;gap:.2rem;justify-content:center;margin-bottom:.55rem}
.tag{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;padding:.1rem .35rem;border-radius:1px}
.tag-series{background:rgba(245,228,192,.06);border:1px solid rgba(245,228,192,.15);color:rgba(245,228,192,.5)}
.tag-got{background:rgba(160,200,232,.08);border:1px solid rgba(160,200,232,.25);color:#a0c8e8}
.tag-hotd{background:rgba(224,112,112,.08);border:1px solid rgba(224,112,112,.25);color:#e07070}
.tag-akotsk{background:rgba(144,200,144,.08);border:1px solid rgba(144,200,144,.25);color:#90c890}
.tag-lore{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:rgba(201,168,76,.6)}
.card-desc{font-size:.82rem;line-height:1.5;color:rgba(242,228,192,.6);text-align:center}
.card-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:.55rem 0}
.card-detail{font-size:.78rem;line-height:1.52;color:rgba(242,228,192,.4);font-style:italic;text-align:left}
.card-rider{display:flex;align-items:center;gap:.35rem;justify-content:center;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--cc-clr);opacity:.75;margin-top:.5rem}
.card-rider::before,.card-rider::after{content:'—'}

.card-status{position:absolute;top:.6rem;right:.6rem;width:8px;height:8px;border-radius:50%}
.card-status.alive{background:#4a9a4a;box-shadow:0 0 6px #4a9a4a}
.card-status.dead{background:#9a3a3a;box-shadow:0 0 6px #9a3a3a}
.card-status.unknown{background:#7a7a4a;box-shadow:0 0 6px #7a7a4a}

/* ── SIZE BADGE (dragons) ── */
.size-badge{position:absolute;top:.55rem;left:.55rem;font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;padding:.12rem .4rem;border:1px solid var(--cc-clr);color:var(--cc-clr);opacity:.65;border-radius:1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;color:rgba(242,228,192,.2);font-style:italic;font-size:1rem;display:none}

/* Bottom nav */
.bottom-nav{text-align:center;padding:2rem;border-top:1px solid var(--border)}
.btn-back{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d);text-decoration:none;border:1px solid var(--border);padding:.5rem 1.3rem;transition:all .2s}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}

@media(max-width:600px){
  .bestiary-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .controls{gap:.35rem}
  .controls-sep{display:none}
}
</style>
</head>

<header>
  <a href="index.html" class="site-back">← Retour à l'Encyclopédie</a>

    <button class="pill pc-loup" data-cat="loup" onclick="setCat(this)">🐺 Loups-garous</button>

  <div class="category-section" data-cat="loup">

  <div class="category-section" data-cat="fantastique">

    </div>

  <!-- ═══════════════════ ANIMAUX ═══════════════════ -->

  <div class="empty-state" id="emptyState">Aucune créature trouvée pour cette recherche…</div>
</div>

<nav class="bottom-nav">

</nav>

    rider:'—',
    desc:'Créatures mi-cheval mi-poisson mentionnées dans les légendes des marins de Westeros et d\'Essos. Certains maesters les considèrent comme de purs mythes.',
    detail:'Les hippocampes apparaissent dans les légendes et sur certaines décorations de navires. Qu\'ils soient réels ou non, ils symbolisent la fascination westerosi pour les abysses et les créatures inconnues des profondeurs marines.',
    tags:['hotd','lore']
  },
  {
    id:'sanglier', cat:'animal', series:['got'], emoji:'🐗',
    name:'Le Sanglier Royal', epithet:'"Tueur de Rois"',
    status:'dead',
    rider:'—',
    desc:'Sanglier ayant mortellement blessé le roi Robert Baratheon lors d\'une partie de chasse royale, précipitant la mort du souverain et les événements de la saison 1.',
    detail:'Robert, affaibli par le vin (que Lancel Lannister lui avait versé en quantités excessives sur ordre de Cersei), fut renversé et éventré par ce sanglier. Sa blessure s\'infecta et il mourut après avoir nommé Ned Stark régent. Un simple porc changea le destin du royaume.',
    tags:['got']
  },
  {
    id:'scorpion-mantis', cat:'animal', series:['got'], emoji:'🦂',
    name:'Les Scorpions de Guerre', epithet:'"Engins Anti-Dragons"',
    status:'unknown',
    rider:'—',
    desc:'Grandes arbalètes de siège conçues par Qyburn pour abattre les dragons de Daenerys. Utilisées par la flotte d\'Euron Greyjoy pour tuer Rhaegal.',
    detail:'Technologie militaire révolutionnaire qui change la donne face aux dragons. Qyburn les fait installer sur tous les navires et sur les remparts de Port-Réal. Leur efficacité partielle (Rhaegal tué, Drogon blessé) prouve que les dragons ne sont pas invincibles.',
    tags:['got']
  }
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let activeSeries = 'all';
let activeCat    = 'all';
const COLOR_MAP = {
  dragon:'var(--c-dragon)', loup:'var(--c-loup)',
  fantastique:'var(--c-fantastique)', animal:'var(--c-animal)'
};

// ══════════════════════════════════════════
// BUILD CARDS
// ══════════════════════════════════════════
function buildCard(c) {
  const clr = COLOR_MAP[c.cat] || 'var(--gold)';
  const seriesTags = c.series.map(s => {
    if(s==='got')    return `<span class="tag tag-got">GoT</span>`;
    if(s==='hotd')   return `<span class="tag tag-hotd">HotD</span>`;
    if(s==='akotsk') return `<span class="tag tag-akotsk">AKotSK</span>`;
    if(s==='lore')   return `<span class="tag tag-lore">Lore</span>`;
    return '';
  }).join('');

  const sizeHtml = c.size ? `<span class="size-badge">${c.size}</span>` : '';
  const riderHtml = c.rider && c.rider !== '—' && c.rider !== 'Aucun — indomptable' && c.rider !== 'Aucun — sauvage'
    ? `<div class="card-rider">${c.rider}</div>`
    : (c.rider === 'Aucun — indomptable' || c.rider === 'Aucun — sauvage'
      ? `<div class="card-rider" style="opacity:.4;font-style:italic">Indomptable</div>` : '');

  return `
    <div class="creature-card"
         id="card-${c.id}"
         data-cat="${c.cat}"
         data-series="${c.series.join(' ')}"
         data-name="${c.name.toLowerCase()} ${c.epithet ? c.epithet.toLowerCase() : ''}"
         style="--cc-clr:${clr}"
         onclick="this.classList.toggle('expanded')"
         title="${c.name}">
      <div class="card-status ${c.status}"></div>
      ${sizeHtml}
      <span class="card-emoji">${c.emoji}</span>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        ${c.epithet ? `<div class="card-epithet">${c.epithet}</div>` : ''}
        <div class="card-tags">${seriesTags}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-divider"></div>
        <div class="card-detail">${c.detail}</div>
        ${riderHtml}
      </div>
    </div>`;
}

function renderAll() {
  const cats = ['dragon','loup','fantastique','animal'];
  cats.forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    const items = CREATURES.filter(c => c.cat === cat);
    grid.innerHTML = items.map(buildCard).join('');
  });
  applyFilters();
}

// ══════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════
function setSeries(btn) {
  document.querySelectorAll('[data-series]').forEach(b => {
    if(b.tagName==='BUTTON') b.classList.remove('active');
  });
  btn.classList.add('active');
  activeSeries = btn.dataset.series;
  applyFilters();
}

function setCat(btn) {
  document.querySelectorAll('[data-cat]').forEach(b => {
    if(b.tagName==='BUTTON') b.classList.remove('active');
  });
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  applyFilters();

  // show/hide category sections
  document.querySelectorAll('.category-section').forEach(sec => {
    sec.style.display = (activeCat === 'all' || sec.dataset.cat === activeCat) ? '' : 'none';
  });
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let visible = 0;

  document.querySelectorAll('.creature-card').forEach(card => {
    const seriesOk = activeSeries === 'all' || card.dataset.series.includes(activeSeries);
    const catOk    = activeCat === 'all' || card.dataset.cat === activeCat;
    const nameOk   = !q || card.dataset.name.includes(q) || card.textContent.toLowerCase().includes(q);
    const show     = seriesOk && catOk && nameOk;
    card.classList.toggle('hidden', !show);
    if(show) visible++;
  });

  document.getElementById('countBadge').textContent = visible + ' créature' + (visible > 1 ? 's' : '');
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';

  // hide empty category sections when filtering
  document.querySelectorAll('.category-section').forEach(sec => {
    if(activeCat !== 'all' && sec.dataset.cat !== activeCat) { sec.style.display='none'; return; }
    const visibleInSec = sec.querySelectorAll('.creature-card:not(.hidden)').length;
    sec.style.display = visibleInSec > 0 ? '' : 'none';
  });
}

// Init
renderAll();
</script>
</body>
</html>
